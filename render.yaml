services:
  - type: web
    name: raktakk-backend
    runtime: docker
    plan: starter
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: validate
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: UNITECH_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OAUTH2_SUCCESS_REDIRECT_URI
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: MAIL_ADMIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: raktakk-postgres
          property: connectionString

databases:
  - name: raktakk-postgres
    databaseName: raktakk
    user: raktakk