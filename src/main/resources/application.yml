spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: raktakk-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${PORT:8080}

unitech:
  api:
    base-url: ${UNITECH_API_BASE:https://api.unitech.sn/api.php}
    key: ${UNITECH_API_KEY:}
  callbacks:
    base-url: ${UNITECH_CALLBACK_BASE:}

app:
  name: Raktakk

  jwt:
    secret: ${JWT_SECRET:}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:1209600000}
    refresh-secret: ${JWT_REFRESH_SECRET:}

  refresh-cookie:
    name: ${REFRESH_COOKIE_NAME:raktakk_refresh_token}
    secure: ${REFRESH_COOKIE_SECURE:false}
    same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:}

  security:
    require-https: ${REQUIRE_HTTPS:false}
    csp: ${SECURITY_CSP:default-src 'self';}

mail:
  from: ${MAIL_FROM:}
  admin: ${MAIL_ADMIN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info