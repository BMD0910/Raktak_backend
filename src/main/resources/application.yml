spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: raktakk-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/raktakk}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${PORT:8080}

unitech:
  api:
    base-url: ${UNITECH_API_BASE:https://api.unitech.sn/api.php}
    key: ${UNITECH_API_KEY:}
  callbacks:
    base-url: ${UNITECH_CALLBACK_BASE:http://localhost:8090}

app:
  name: Raktakk
  jwt:
    secret: ${JWT_SECRET:change-this-in-prod-change-this-in-prod-change-this-in-prod}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:1209600000}
    refresh-secret: ${JWT_REFRESH_SECRET:change-this-refresh-secret-in-prod-change-this-refresh-secret}
  refresh-cookie:
    name: ${REFRESH_COOKIE_NAME:raktakk_refresh_token}
    secure: ${REFRESH_COOKIE_SECURE:false}
    same-site: ${REFRESH_COOKIE_SAME_SITE:Lax}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:5173/oauth2/success}
  security:
    require-https: ${REQUIRE_HTTPS:false}
    csp: ${SECURITY_CSP:default-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';}

mail:
  from: ${MAIL_FROM:support@raktakk.com}
  admin: ${MAIL_ADMIN:admin@raktakk.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info
