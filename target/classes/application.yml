spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: raktakk-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # datasource:
  #   url: ${SPRING_DATASOURCE_URL:}
  #   username: ${SPRING_DATASOURCE_USERNAME:postgres}
  #   password: ${SPRING_DATASOURCE_PASSWORD:}
  #   driver-class-name: org.postgresql.Driver

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:}}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}
    driver-class-name: org.postgresql.Driver  

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:1209600000}
    refresh-secret: ${JWT_REFRESH_SECRET}